<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Lab Feed</title>
    <link rel="icon" type="image/svg+xml" href="/focuslab-logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div id="app">
        <nav id="sidebar">
            <div class="logo">Focus Lab Feed</div>
            <a href="#platforms" class="nav-item active" data-page="platforms">
                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                    <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                    <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                    <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                </svg>
                Platforms
            </a>
            <a href="#collect" class="nav-item" data-page="collect">
                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/>
                </svg>
                Collect
            </a>
            <a href="#viewer" class="nav-item" data-page="viewer">
                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                Feed
            </a>
            <a href="#curated" class="nav-item" data-page="curated">
                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15 8.5 22 9.5 17 14.5 18 21.5 12 18 6 21.5 7 14.5 2 9.5 9 8.5 12 2"/>
                </svg>
                AI Curation
            </a>
            <a href="#export" class="nav-item" data-page="export">
                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Export
            </a>
            <a href="#curate" class="nav-item" data-page="curate">
                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="16" x2="12" y2="12"/>
                    <line x1="12" y1="8" x2="12.01" y2="8"/>
                </svg>
                Instructions
            </a>
            <div class="workspace-chip" id="workspace-chip">
                <div class="workspace-label">Workspace</div>
                <div class="workspace-path" id="workspace-path" title="">Loading…</div>
                <button class="workspace-open" id="workspace-open-btn">Open folder</button>
            </div>
        </nav>
        <main id="content">
            <!-- Pages rendered here by app.js -->
        </main>
    </div>
    <script src="/js/platforms.js"></script>
    <script src="/js/collection.js"></script>
    <script src="/js/viewer.js"></script>
    <script src="/js/export.js"></script>
    <script src="/js/curated.js"></script>
    <script src="/js/curation.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
