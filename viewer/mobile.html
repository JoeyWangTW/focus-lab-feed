<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Focus Lab Feed</title>
<link rel="icon" type="image/svg+xml" href="focuslab-logo.svg">
<link rel="apple-touch-icon" href="focuslab-logo.svg">
<style>
  :root {
    --bg: #0f1419;
    --bg-elev: #15202b;
    --border: #2c3640;
    --text: #e7e9ea;
    --text-dim: #8899a6;
    --accent: #1da1f2;
    --danger: #f4212e;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  [hidden] { display: none !important; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { max-width: 640px; margin: 0 auto; min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom); }

  /* Import screen */
  .import { padding: 24px 20px; min-height: 100dvh; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
  .import h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
  .import .sub { color: var(--text-dim); font-size: 15px; line-height: 1.5; }
  .drop {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    background: var(--bg-elev);
    transition: border-color 0.15s, background 0.15s;
  }
  .drop.over { border-color: var(--accent); background: rgba(29,161,242,0.05); }
  .drop .hint { color: var(--text-dim); font-size: 14px; margin-top: 10px; }
  .drop input[type=file] { display: none; }
  .btn {
    background: var(--accent); color: #fff; border: none; padding: 14px 22px;
    border-radius: 999px; font-size: 15px; font-weight: 600; cursor: pointer;
    width: 100%; max-width: 280px; margin: 0 auto;
  }
  .btn:disabled { opacity: 0.5; }
  .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-row { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .resume { padding: 14px 16px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; }
  .resume .name { font-weight: 600; margin-bottom: 4px; }
  .resume .meta { color: var(--text-dim); font-size: 13px; }
  .resume-row { display: flex; gap: 10px; margin-top: 12px; }
  .resume-row .btn { flex: 1; padding: 10px 14px; font-size: 14px; margin: 0; }
  .progress { margin-top: 14px; }
  .progress .bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress .bar > div { height: 100%; background: var(--accent); width: 0; transition: width 0.2s; }
  .progress .label { font-size: 13px; color: var(--text-dim); margin-top: 6px; text-align: center; }
  .error { color: var(--danger); font-size: 14px; padding: 10px 14px; background: rgba(244,33,46,0.08); border-radius: 8px; }

  /* Feed */
  header.feed-head {
    position: sticky; top: 0; z-index: 10;
    background: rgba(15,20,25,0.85);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    padding-top: calc(12px + env(safe-area-inset-top));
  }
  header.feed-head .back { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text); font-size: 13px; font-weight: 600; padding: 6px 10px; cursor: pointer; border-radius: 999px; white-space: nowrap; }
  header.feed-head .back:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); color: var(--accent); }
  header.feed-head .title { flex: 1; min-width: 0; }
  header.feed-head .title .pack { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  header.feed-head .title .stats { font-size: 12px; color: var(--text-dim); }

  .post { padding: 16px; border-bottom: 1px solid var(--border); }
  .post-header { display: flex; gap: 10px; align-items: baseline; margin-bottom: 8px; }
  .author { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .handle { color: var(--text-dim); font-size: 14px; }
  .time { color: var(--text-dim); font-size: 12px; margin-left: auto; white-space: nowrap; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
  .badge.twitter { background: rgba(29,161,242,0.15); color: var(--accent); }
  .badge.threads { background: rgba(255,255,255,0.08); color: #ddd; }
  .badge.instagram { background: rgba(225,48,108,0.15); color: #e1306c; }
  .badge.youtube { background: rgba(255,0,0,0.15); color: #ff4444; }
  .repost-note { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
  .score { margin-left: 6px; padding: 1px 6px; border-radius: 6px; font-size: 11px; background: rgba(29,161,242,0.12); color: var(--accent); font-weight: 600; }

  .post-text { font-size: 15px; line-height: 1.5; margin-bottom: 10px; word-wrap: break-word; white-space: pre-wrap; }
  .post-text a { color: var(--accent); text-decoration: none; }
  .filter-reason { font-size: 12px; color: var(--text-dim); font-style: italic; margin-bottom: 8px; padding: 6px 10px; background: rgba(29,161,242,0.04); border-left: 2px solid var(--accent); border-radius: 0 6px 6px 0; }

  .media-wrap { margin-bottom: 10px; border-radius: var(--radius); overflow: hidden; background: #000; }
  .media-wrap.single img, .media-wrap.single video { width: 100%; display: block; max-height: 75vh; object-fit: contain; }
  .carousel { display: flex; gap: 3px; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .carousel::-webkit-scrollbar { display: none; }
  .carousel .slide { flex: 0 0 100%; scroll-snap-align: start; background: #000; display: flex; align-items: center; justify-content: center; }
  .carousel .slide img, .carousel .slide video { width: 100%; display: block; max-height: 75vh; object-fit: contain; }

  .quoted { border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 10px; background: rgba(255,255,255,0.02); }
  .quoted .q-header { font-size: 13px; margin-bottom: 4px; display: flex; gap: 6px; align-items: baseline; }
  .quoted .q-author { font-weight: 700; }
  .quoted .q-handle { color: var(--text-dim); font-size: 12px; }
  .quoted .q-text { font-size: 14px; line-height: 1.4; color: var(--text); white-space: pre-wrap; word-wrap: break-word; }

  .stats { display: flex; gap: 20px; color: var(--text-dim); font-size: 13px; margin-top: 8px; }
  .stats span { display: flex; align-items: center; gap: 5px; }

  .post-link { display: inline-block; margin-top: 8px; color: var(--text-dim); font-size: 12px; text-decoration: none; }
  .post-link:hover { color: var(--accent); }

  .missing-media { padding: 20px; text-align: center; color: var(--text-dim); font-size: 13px; }

  .empty { padding: 60px 20px; text-align: center; color: var(--text-dim); }

  video { cursor: pointer; }
  img { cursor: default; }
</style>
</head>
<body>

<div id="app">
  <!-- Import screen -->
  <section id="import-view" class="import">
    <div>
      <h1>Focus Lab Feed</h1>
      <p class="sub">Import a pack to scroll your curated feed. Drop a <code>.zip</code> below, or tap to pick one from Files.</p>
    </div>

    <label class="drop" id="drop">
      <div style="font-size:32px">📦</div>
      <div style="margin-top:8px;font-weight:600">Drop pack here</div>
      <div class="hint">or tap to choose a file</div>
      <input type="file" id="file-input" accept=".zip,application/zip">
    </label>

    <div id="resume" class="resume" hidden>
      <div class="name" id="resume-name"></div>
      <div class="meta" id="resume-meta"></div>
      <div class="resume-row">
        <button class="btn" id="resume-btn">Resume</button>
        <button class="btn ghost" id="resume-clear">Clear</button>
      </div>
    </div>

    <div id="progress" class="progress" hidden>
      <div class="bar"><div id="progress-bar"></div></div>
      <div class="label" id="progress-label">Importing…</div>
    </div>

    <div id="err" class="error" hidden></div>
  </section>

  <!-- Feed screen -->
  <section id="feed-view" hidden>
    <header class="feed-head">
      <button class="back" id="back-btn" aria-label="change pack">↺ New pack</button>
      <div class="title">
        <div class="pack" id="pack-name"></div>
        <div class="stats" id="pack-stats"></div>
      </div>
    </header>
    <div id="posts"></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
(function () {
  'use strict';

  // ---------------- State ----------------
  const state = {
    pack: null,          // { name, posts, mediaBlobs: Map<path, Blob> }
    urls: new Map(),     // path -> blob URL (created lazily, revoked on clear)
  };

  const $ = (id) => document.getElementById(id);

  // ---------------- Post anchor memory ----------------
  // We remember the POST you were on (by id), not pixel scroll position.
  // On resume, scrollIntoView the saved post — works regardless of layout drift.
  const ANCHOR_KEY = 'focuslab:anchor';

  function findAnchorPostId() {
    const posts = document.querySelectorAll('#posts .post');
    const HEADER_OFFSET = 80; // sticky header
    for (const p of posts) {
      const rect = p.getBoundingClientRect();
      // First post whose bottom is past the header — the one currently in focus.
      if (rect.bottom > HEADER_OFFSET) return p.dataset.id;
    }
    return null;
  }
  function saveAnchor() {
    if (!state.pack) return;
    const anchorId = findAnchorPostId();
    if (!anchorId) return;
    try {
      localStorage.setItem(ANCHOR_KEY, JSON.stringify({
        packName: state.pack.name,
        anchorId,
        savedAt: Date.now(),
      }));
    } catch (e) { /* quota — ignore */ }
  }
  function restoreAnchor() {
    if (!state.pack) return;
    let data;
    try { data = JSON.parse(localStorage.getItem(ANCHOR_KEY) || 'null'); } catch (e) { return; }
    if (!data || data.packName !== state.pack.name) return;
    const target = document.querySelector(`.post[data-id="${CSS.escape(data.anchorId)}"]`);
    if (!target) return;
    // Scroll once now, then again after images/videos lay out (they can shift
    // the anchor as they load). rAF + follow-ups cover most cases.
    const scroll = () => target.scrollIntoView({ block: 'start', behavior: 'auto' });
    requestAnimationFrame(scroll);
    setTimeout(scroll, 300);
    setTimeout(scroll, 1000);
  }
  function clearAnchor() { try { localStorage.removeItem(ANCHOR_KEY); } catch (e) {} }

  // ---------------- IndexedDB ----------------
  // Single-pack cache; we overwrite any previous pack on import.
  const DB_NAME = 'focuslab';
  const STORE = 'pack';
  const KEY = 'current';

  function idbOpen() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  async function idbPut(value) {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(value, KEY);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
  async function idbGet() {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(KEY);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }
  async function idbClear() {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(KEY);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  // ---------------- Zip import ----------------
  async function importZip(file) {
    // Free any previous pack's blob URLs/memory before loading the new one.
    clearBlobUrls();
    state.pack = null;

    showProgress(0, `Reading ${file.name}…`);
    hideError();

    let zip;
    try {
      zip = await JSZip.loadAsync(file);
    } catch (e) {
      showError('Could not read zip: ' + e.message);
      hideProgress();
      return;
    }

    // Find the posts JSON. Prefer filtered, then posts.json — at ANY depth in the zip
    // (macOS Finder "Compress" wraps the folder, so entries are like `pack-name/posts.json`).
    const allFiles = Object.keys(zip.files).filter(n => !zip.files[n].dir);
    const matchAny = (basename) =>
      allFiles.find(n => n === basename) ||
      allFiles.find(n => n.endsWith('/' + basename));
    const postsName =
      matchAny('posts.filtered.json') ||
      matchAny('posts.json') ||
      allFiles.find(n => /(?:^|\/)[^/]*posts[^/]*\.json$/i.test(n));

    if (!postsName) {
      const sample = allFiles.slice(0, 5).join(', ') || '(empty)';
      showError(`No posts.json or posts.filtered.json found in zip. Entries: ${sample}${allFiles.length > 5 ? ' …' : ''}`);
      hideProgress();
      return;
    }

    // Base path — everything sits under this prefix inside the zip (may be empty).
    const basePath = postsName.includes('/') ? postsName.substring(0, postsName.lastIndexOf('/') + 1) : '';

    showProgress(5, 'Parsing posts…');
    const postsText = await zip.files[postsName].async('string');
    let data;
    try { data = JSON.parse(postsText); } catch (e) {
      showError('posts.json is not valid JSON: ' + e.message);
      hideProgress();
      return;
    }
    const posts = data.posts || data.tweets || [];
    if (!Array.isArray(posts)) {
      showError('posts.json has no `posts` array.');
      hideProgress();
      return;
    }

    // Collect referenced media paths
    const referenced = new Set();
    for (const p of posts) {
      for (const path of (p.local_media_paths || [])) referenced.add(path);
      // quoted posts can reference their own media too (future-proof)
      const q = p.quoted_post;
      if (q && Array.isArray(q.local_media_paths)) {
        for (const path of q.local_media_paths) referenced.add(path);
      }
    }

    // Extract media blobs (only files actually referenced by posts).
    // Posts store logical paths like "media/abc.jpg"; the zip may have them under
    // a basePath prefix (e.g., "focus-lab-pack-.../media/abc.jpg"). Key blobs by
    // the logical path so resolveLocal() works without knowing the prefix.
    const mediaBlobs = new Map();
    const paths = Array.from(referenced);
    let done = 0;
    for (const path of paths) {
      // Try basePath-prefixed first, fall back to raw path for older/flat zips.
      const entry = zip.files[basePath + path] || zip.files[path];
      if (!entry || entry.dir) { done++; continue; }
      try {
        const blob = await entry.async('blob');
        mediaBlobs.set(path, blob);
      } catch (e) {
        console.warn('Failed to extract', path, e);
      }
      done++;
      const pct = 5 + Math.round((done / Math.max(paths.length, 1)) * 90);
      showProgress(pct, `Extracting media ${done}/${paths.length}…`);
    }

    showProgress(97, 'Caching…');
    const pack = {
      name: file.name.replace(/\.zip$/i, ''),
      imported_at: new Date().toISOString(),
      posts,
      mediaBlobs,
      meta: data.export_metadata || data.filter_metadata || {},
    };
    try {
      await idbPut(pack);
    } catch (e) {
      console.warn('IDB save failed (continuing in-memory):', e);
    }

    state.pack = pack;
    hideProgress();
    renderFeed();
  }

  // ---------------- Media URL resolution ----------------
  // Map media path → blob URL (lazy, memoized). Returns null if not found.
  function resolveLocal(path) {
    if (!path || !state.pack) return null;
    if (state.urls.has(path)) return state.urls.get(path);
    const blob = state.pack.mediaBlobs.get(path);
    if (!blob) return null;
    const url = URL.createObjectURL(blob);
    state.urls.set(path, url);
    return url;
  }

  function clearBlobUrls() {
    for (const url of state.urls.values()) URL.revokeObjectURL(url);
    state.urls.clear();
  }

  // ---------------- Rendering ----------------
  function escapeHTML(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function linkify(text) {
    const escaped = escapeHTML(text);
    return escaped.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  }
  function relTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const s = Math.max(1, Math.floor((Date.now() - d.getTime()) / 1000));
    if (s < 60) return s + 's';
    if (s < 3600) return Math.floor(s / 60) + 'm';
    if (s < 86400) return Math.floor(s / 3600) + 'h';
    if (s < 2592000) return Math.floor(s / 86400) + 'd';
    return d.toISOString().slice(0, 10);
  }

  function mediaElement(path, fallbackUrl) {
    const localUrl = resolveLocal(path);
    const src = localUrl || fallbackUrl || '';
    if (!src) return `<div class="missing-media">Media unavailable</div>`;
    const lower = (path || fallbackUrl || '').toLowerCase();
    const isVideo = /\.(mp4|mov|m4v|webm)(\?|$)/.test(lower) || lower.includes('_v0') || lower.includes('_v1');
    if (isVideo) {
      return `<video src="${src}" playsinline muted loop preload="metadata" controls></video>`;
    }
    return `<img src="${src}" loading="lazy" alt="">`;
  }

  function renderMedia(post) {
    const paths = post.local_media_paths || [];
    const fallbacks = [...(post.media_urls || []), ...(post.video_urls || [])];
    const count = Math.max(paths.length, fallbacks.length);
    if (count === 0) return '';
    if (count === 1) {
      return `<div class="media-wrap single">${mediaElement(paths[0], fallbacks[0])}</div>`;
    }
    let slides = '';
    for (let i = 0; i < count; i++) {
      slides += `<div class="slide">${mediaElement(paths[i], fallbacks[i])}</div>`;
    }
    return `<div class="media-wrap"><div class="carousel">${slides}</div></div>`;
  }

  function renderQuoted(q) {
    if (!q) return '';
    const name = escapeHTML(q.author_name || q.author_handle || '');
    const handle = q.author_handle ? '@' + escapeHTML(q.author_handle) : '';
    const text = linkify(q.text || '');
    return `<div class="quoted">
      <div class="q-header"><span class="q-author">${name}</span><span class="q-handle">${handle}</span></div>
      <div class="q-text">${text}</div>
    </div>`;
  }

  function renderPost(post) {
    const platform = (post.platform || '').toLowerCase();
    const badgeClass = ['twitter','threads','instagram','youtube'].includes(platform) ? platform : '';
    const name = escapeHTML(post.author_name || post.author_handle || '');
    const handle = post.author_handle ? '@' + escapeHTML(post.author_handle) : '';
    const time = relTime(post.created_at);
    const repostNote = post.is_repost && post.original_author
      ? `<div class="repost-note">↻ reposted by @${escapeHTML(post.original_author)}</div>`
      : '';
    const score = typeof post.score === 'number' ? `<span class="score">${post.score}</span>` : '';
    const reason = post.filter_reason ? `<div class="filter-reason">${escapeHTML(post.filter_reason)}</div>` : '';
    const text = post.text ? `<div class="post-text">${linkify(post.text)}</div>` : '';
    const media = renderMedia(post);
    const quoted = renderQuoted(post.quoted_post);
    const stats = `<div class="stats">
      ${post.likes ? `<span>♥ ${formatNum(post.likes)}</span>` : ''}
      ${post.reposts ? `<span>↻ ${formatNum(post.reposts)}</span>` : ''}
      ${post.replies ? `<span>💬 ${formatNum(post.replies)}</span>` : ''}
    </div>`;
    const link = post.url ? `<a class="post-link" href="${escapeHTML(post.url)}" target="_blank" rel="noopener">open on ${platform || 'source'} →</a>` : '';
    return `<article class="post" data-id="${escapeHTML(post.id || '')}">
      ${repostNote}
      <div class="post-header">
        ${badgeClass ? `<span class="badge ${badgeClass}">${platform}</span>` : ''}
        <span class="author">${name}</span>
        <span class="handle">${handle}</span>
        <span class="time">${time}</span>
        ${score}
      </div>
      ${reason}
      ${text}
      ${media}
      ${quoted}
      ${stats}
      ${link}
    </article>`;
  }

  function formatNum(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
    if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'K';
    return String(n);
  }

  function renderFeed() {
    const pack = state.pack;
    if (!pack) return showImport();

    $('pack-name').textContent = pack.name;
    $('pack-stats').textContent = `${pack.posts.length} posts · ${pack.mediaBlobs.size} media`;
    const html = pack.posts.map(renderPost).join('');
    $('posts').innerHTML = html || '<div class="empty">No posts in this pack.</div>';

    $('import-view').hidden = true;
    $('feed-view').hidden = false;
    window.scrollTo(0, 0);

    setupVideoAutoplay();
    restoreAnchor();
  }

  function showImport() {
    $('feed-view').hidden = true;
    $('import-view').hidden = false;
  }

  // Pause offscreen videos; play inview (muted). Tap unmutes.
  function setupVideoAutoplay() {
    const vids = document.querySelectorAll('#posts video');
    const io = new IntersectionObserver((entries) => {
      for (const e of entries) {
        const v = e.target;
        if (e.isIntersecting && e.intersectionRatio > 0.6) {
          v.play().catch(() => {/* autoplay blocked — user taps */});
        } else {
          v.pause();
        }
      }
    }, { threshold: [0, 0.6, 1] });
    for (const v of vids) {
      io.observe(v);
      v.addEventListener('click', () => {
        v.muted = !v.muted;
        if (v.paused) v.play().catch(() => {});
      });
    }
  }

  // ---------------- UI wiring ----------------
  function showProgress(pct, label) {
    $('progress').hidden = false;
    $('progress-bar').style.width = pct + '%';
    $('progress-label').textContent = label || '';
  }
  function hideProgress() { $('progress').hidden = true; }
  function showError(msg) { const el = $('err'); el.textContent = msg; el.hidden = false; }
  function hideError() { $('err').hidden = true; }

  async function refreshResumeBanner() {
    try {
      const saved = await idbGet();
      if (saved && saved.posts && saved.posts.length) {
        $('resume-name').textContent = saved.name;
        const imported = saved.imported_at ? new Date(saved.imported_at).toLocaleString() : '';
        $('resume-meta').textContent = `${saved.posts.length} posts · imported ${imported}`;
        $('resume').hidden = false;
        $('resume-btn').onclick = () => {
          state.pack = saved;
          renderFeed();
        };
        $('resume-clear').onclick = async () => {
          await idbClear();
          clearAnchor();
          $('resume').hidden = true;
        };
      } else {
        $('resume').hidden = true;
      }
    } catch (e) {
      console.warn('IDB read failed:', e);
    }
  }

  async function init() {
    await refreshResumeBanner();

    // Throttled anchor save (per pack) — Resume returns to the same POST.
    let anchorTimer = null;
    window.addEventListener('scroll', () => {
      if (anchorTimer) return;
      anchorTimer = setTimeout(() => { anchorTimer = null; saveAnchor(); }, 400);
    }, { passive: true });

    const input = $('file-input');
    const drop = $('drop');
    input.addEventListener('change', () => {
      if (input.files && input.files[0]) importZip(input.files[0]);
    });
    ['dragenter', 'dragover'].forEach(ev => drop.addEventListener(ev, (e) => {
      e.preventDefault(); e.stopPropagation(); drop.classList.add('over');
    }));
    ['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, (e) => {
      e.preventDefault(); e.stopPropagation(); drop.classList.remove('over');
    }));
    drop.addEventListener('drop', (e) => {
      const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) importZip(f);
    });

    $('back-btn').onclick = async () => {
      clearBlobUrls();
      // Free the in-memory pack so blobs can GC; IDB still holds it for Resume.
      state.pack = null;
      $('posts').innerHTML = '';
      // Refresh the resume banner in case state changed.
      await refreshResumeBanner();
      showImport();
      window.scrollTo(0, 0);
    };
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
